name: Build VPM Listing

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, zipfile, io

          token = os.environ['GH_TOKEN']
          repo  = os.environ['REPO']

          with open('source.json') as f:
              source = json.load(f)

          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/releases',
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28'
              }
          )
          with urllib.request.urlopen(req) as r:
              releases = json.loads(r.read())

          packages = {}

          for release in releases:
              if release.get('draft', False):
                  continue
              for asset in release.get('assets', []):
                  name = asset['name']
                  if not (name.endswith('.zip') and 'com.pururut.pss' in name):
                      continue
                  zip_url = asset['browser_download_url']
                  try:
                      with urllib.request.urlopen(zip_url) as r2:
                          zip_data = r2.read()
                      with zipfile.ZipFile(io.BytesIO(zip_data)) as z:
                          with z.open('package.json') as pf:
                              pkg = json.loads(pf.read())
                      pkg['url'] = zip_url
                      pkg_name    = pkg['name']
                      pkg_version = pkg['version']
                      if pkg_name not in packages:
                          packages[pkg_name] = {'versions': {}}
                      packages[pkg_name]['versions'][pkg_version] = pkg
                      print(f'Added {pkg_name}@{pkg_version}')
                  except Exception as e:
                      print(f'Error processing {name}: {e}')

          index = {
              'name':        source['name'],
              'id':          source['id'],
              'url':         source['url'],
              'author':      source['author'],
              'description': source['description'],
              'packages':    packages
          }

          os.makedirs('_site', exist_ok=True)
          with open('_site/index.json', 'w') as f:
              json.dump(index, f, indent=2)
          print('Done.')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
