name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      config_package: ${{ steps.config_package.outputs.configPackage }}
    steps:
      - uses: actions/checkout@v3
      - name: Read package.json
        id: config_package
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with:
          file_path: "package.json"

  release:
    needs: config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create release zip
        uses: vimtor/action-zip@v1
        with:
          files: .
          recursive: true
          dest: ${{ fromJson(needs.config.outputs.config_package).name }}-${{ fromJson(needs.config.outputs.config_package).version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@1e07f4398721186383de40550babbdf2b84acfc5
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ fromJson(needs.config.outputs.config_package).name }}-${{ fromJson(needs.config.outputs.config_package).version }}.zip
          name: ${{ fromJson(needs.config.outputs.config_package).displayName }} ${{ fromJson(needs.config.outputs.config_package).version }}
          body: ${{ fromJson(needs.config.outputs.config_package).description }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
